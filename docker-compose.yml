services:
  mysql:
    image: mysql:8.4
    container_name: m-verify-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: m_verify
      MYSQL_USER: m_verify
      MYSQL_PASSWORD: m_verify_password
      MYSQL_ROOT_PASSWORD: root_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/001_schema.sql:ro
      - ./database/docker-init/002_localhost_user.sql:/docker-entrypoint-initdb.d/002_localhost_user.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -proot_password --silent"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: m-verify-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MYSQL_HOST: mysql
      PUBLIC_API_BASE_URL: http://localhost:4000
    ports:
      - "4000:4000"
    depends_on:
      mysql:
        condition: service_healthy

  admin:
    build:
      context: .
      dockerfile: apps/admin/Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:4000
    container_name: m-verify-admin
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - api

volumes:
  mysql_data:
